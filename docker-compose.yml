services:
  db:
    image: postgres:16
    container_name: crm_n8n_db
    environment:
      POSTGRES_USER: crm
      POSTGRES_PASSWORD: crm
      POSTGRES_DB: crm
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U crm -d crm"]
      interval: 5s
      timeout: 3s
      retries: 10

  # Opcional para probar el círculo completo localmente:
  #   docker compose --profile n8n up -d
  n8n:
    image: n8nio/n8n:latest
    container_name: crm_n8n_n8n
    profiles: ["n8n"]
    ports:
      - "5678:5678"
    environment:
      N8N_SECURE_COOKIE: "false"
    volumes:
      - n8n_data:/home/node/.n8n

volumes:
  pgdata:
  n8n_data:
