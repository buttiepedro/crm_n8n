# Stack — configuración en UN solo archivo: ./.env (raíz)
#   cp .env.example .env   →   docker compose up -d --build
#
#   → db       PostgreSQL 16 (SOLO red interna, sin puerto expuesto)
#   → migrate  alembic upgrade head + seed (corre una vez, al terminar arranca api)
#   → api      FastAPI → expuesta en :8001 (webhooks de Meta y hooks de n8n)
#   → web      SPA React + nginx (proxy /api → api)  →  http://host:8000
#
# Únicos puertos expuestos: 8000 (front) y 8001 (api para n8n/Meta).
# n8n es EXTERNO. Tokens de WhatsApp, app secret, webhooks, cuentas y usuarios
# se configuran desde el PANEL TÉCNICO (no desde el .env).

services:
  db:
    image: postgres:16
    container_name: crm_n8n_db
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-crm}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-crm}
      POSTGRES_DB: ${POSTGRES_DB:-crm}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-crm} -d ${POSTGRES_DB:-crm}"]
      interval: 5s
      timeout: 3s
      retries: 10

  migrate:
    build: ./apps/api
    container_name: crm_n8n_migrate
    command: sh -c "alembic upgrade head && python scripts/seed.py"
    env_file:
      - ./.env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-crm}:${POSTGRES_PASSWORD:-crm}@db:5432/${POSTGRES_DB:-crm}
    depends_on:
      db:
        condition: service_healthy

  api:
    build: ./apps/api
    container_name: crm_n8n_api
    ports:
      - "${API_PORT:-8001}:8080"   # API para n8n y webhooks de Meta
    env_file:
      - ./.env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-crm}:${POSTGRES_PASSWORD:-crm}@db:5432/${POSTGRES_DB:-crm}
      STORAGE_LOCAL_PATH: /data/storage
    volumes:
      - attachments:/data/storage
    depends_on:
      migrate:
        condition: service_completed_successfully
    restart: unless-stopped

  web:
    build: ./apps/web
    container_name: crm_n8n_web
    ports:
      - "${WEB_PORT:-8000}:80"     # frontend (nginx proxea /api → api:8080)
    depends_on:
      - api
    restart: unless-stopped

volumes:
  pgdata:
  attachments:
