# Stack de desarrollo:
#   docker compose up -d --build
#
#   → db       PostgreSQL 16 (healthcheck)
#   → migrate  alembic upgrade head + seed (corre una vez, al terminar arranca api)
#   → api      FastAPI en la red interna (expuesto en :8080 para túneles/webhooks de Meta)
#   → web      SPA React + nginx con proxy /api → api:8080  →  http://localhost:8000
#
# n8n es EXTERNO a este stack: la URL del webhook hacia n8n se configura por
# cuenta (seed: variable N8N_WEBHOOK_BASE en apps/api/.env; luego, panel de
# configuración). Requiere apps/api/.env (ver apps/api/.env.example).

services:
  db:
    image: postgres:16
    container_name: crm_n8n_db
    environment:
      POSTGRES_USER: crm
      POSTGRES_PASSWORD: crm
      POSTGRES_DB: crm
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U crm -d crm"]
      interval: 5s
      timeout: 3s
      retries: 10

  migrate:
    build: ./apps/api
    container_name: crm_n8n_migrate
    command: sh -c "alembic upgrade head && python scripts/seed.py"
    env_file:
      - ./apps/api/.env
    environment:
      DATABASE_URL: postgresql+asyncpg://crm:crm@db:5432/crm
    depends_on:
      db:
        condition: service_healthy

  api:
    build: ./apps/api
    container_name: crm_n8n_api
    ports:
      - "8080:8080"   # para túnel de webhooks de Meta y debugging directo
    env_file:
      - ./apps/api/.env
    environment:
      DATABASE_URL: postgresql+asyncpg://crm:crm@db:5432/crm
      STORAGE_LOCAL_PATH: /data/storage
    volumes:
      - attachments:/data/storage
    depends_on:
      migrate:
        condition: service_completed_successfully
    restart: unless-stopped

  web:
    build: ./apps/web
    container_name: crm_n8n_web
    ports:
      - "8000:80"     # frontend: http://localhost:8000 (proxy /api → api:8080)
    depends_on:
      - api
    restart: unless-stopped

volumes:
  pgdata:
  attachments:
